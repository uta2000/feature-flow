plugin_version: 1.28.1
platform: cli
stack:
  - node-js
  - python
context7:
  node-js: /vercel/next.js
  python: /textualize/textual
# Tool Selector Configuration
# Intelligently recommends GSD vs feature-flow based on project scale
tool_selector:
  enabled: true                    # Enable/disable intelligent tool selection
  confidence_threshold: 0.7        # Only recommend GSD if confidence >= 70%
  auto_launch_gsd: false          # If true, launch GSD automatically without asking
gotchas:
  - "Settings SKILL.md enforces max 4 options per AskUserQuestion — adding new dashboard categories requires merging with existing ones, not adding a 5th option"
notifications:
  on_stop: bell
design_preferences:
  error_handling: exceptions
  testing: match_existing
